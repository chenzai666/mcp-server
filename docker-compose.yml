services:
  # 我们的 MCP 主服务
  mcp-web-tools:
    build: .
    container_name: mcp-server
    ports:
      - "59795:59795"
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - SEARXNG_URL=http://searxng:18080/search
      - JINA_API_KEY=               # (可选) 填入你的 Jina API Key 提升限额
    depends_on:
      - searxng

  # 本地 SearXNG 聚合搜索引擎
  searxng:
    image: docker.io/searxng/searxng  # 加上 docker.io 强制从官方拉取，去掉了容易报错的 :latest 标签
    container_name: searxng
    restart: always
    ports:
      - "18080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:18080/
      - SEARXNG_SECRET=mcp_searxng_secret_2026
      - SEARXNG_SEARCH_FORMATS=html,json
